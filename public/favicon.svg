<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#CC0000"/>

  <!-- Star -->
  <polygon
    points="32,6 35.4,17.5 47.4,17.5 37.7,24.5 41.1,36 32,29 22.9,36 26.3,24.5 16.6,17.5 28.6,17.5"
    fill="#FFD700"
  />

  <!-- Hammer and sickle -->
  <g fill="#FFD700">
    <!-- Sickle -->
    <path d="M20 46
             a11 11 0 1 1 14.5 -8.5
             a8.2 8.2 0 1 0 -9.8 6.2
             z"/>
    <!-- Hammer handle -->
    <rect x="30" y="30" width="4.5" height="24" rx="1.5" transform="rotate(45 32 42)"/>
    <!-- Hammer head -->
    <rect x="35" y="26" width="14" height="8" rx="1.5" transform="rotate(45 42 30)"/>
  </g>
</svg>
